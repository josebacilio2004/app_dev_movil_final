workflows:
  android-ios-workflow:
    name: Android & iOS Workflow
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      groups:
        - ad-hoc-credentials # Agrupar aquí certificados si se desea firma automática
      vars:
        PACKAGE_NAME: "com.aly.gestor.inventario"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
        - pattern: 'develop'
          include: true
        - pattern: 'release/*'
          include: true
    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Build Android APK
        script: |
          flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
    publishing:
      email:
        recipients:
          - admin@example.com # Cambiar por el correo del usuario
        notify:
          success: true
          failure: true
