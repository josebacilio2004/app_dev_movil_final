workflows:
  android-ios-workflow:
    name: Android & iOS Workflow
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      vars:
        PACKAGE_NAME: "com.jose.stitch.stitchApp"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
        - pattern: 'develop'
          include: true
    scripts:
      - name: Configure Flutter and Get packages
        script: |
          flutter config --no-enable-swift-package-manager
          flutter pub get
      - name: Install iOS Pods
        script: |
          cd ios && pod install
      - name: Build Android APK
        script: |
          flutter build apk --release
      - name: Build iOS (Unsigned IPA)
        script: |
          flutter build ios --release --no-codesign
          echo "=== Contenido de build/ios/iphoneos ==="
          ls -la build/ios/iphoneos || true
          mkdir -p build/ios/ipa/Payload
          echo "=== Copiando Runner.app ==="
          cp -RL build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          echo "=== Contenido de Payload ==="
          ls -la build/ios/ipa/Payload || true
          echo "=== Comprimiendo a IPA ==="
          cd build/ios/ipa
          zip -r GestorInventario.ipa Payload
          echo "=== IPA Generado ==="
          ls -lh GestorInventario.ipa || true
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/ios/ipa/GestorInventario.ipa
    publishing:
      email:
        recipients:
          - 74934503@continental.edu.pe
        notify:
          success: true
          failure: true
